<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Alumni Network Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card" style="max-width: 600px;">
            <div class="text-center mb-4">
                <h2>🎓 Join Our Network</h2>
                <p>Create your account to connect with alumni</p>
            </div>
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" id="fullName" class="form-control" placeholder="Enter your full name" required>
                    <span class="error-message" style="display: none; color: #EF4444; font-size: 0.875rem;"></span>
                </div>
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                    <span class="error-message" style="display: none; color: #EF4444; font-size: 0.875rem;"></span>
                </div>
                <div class="form-group">
                    <label for="phone" class="form-label">Phone</label>
                    <input type="tel" id="phone" class="form-control" placeholder="Enter your phone number" required>
                    <span class="error-message" style="display: none; color: #EF4444; font-size: 0.875rem;"></span>
                </div>
                <div class="d-flex gap-2">
                    <div class="form-group" style="flex: 1;">
                        <label for="graduationYear" class="form-label">Graduation Year</label>
                        <select id="graduationYear" class="form-control" required>
                            <option value="">Select Year</option>
                            <option value="2024">2024</option>
                            <option value="2023">2023</option>
                            <option value="2022">2022</option>
                            <option value="2021">2021</option>
                            <option value="2020">2020</option>
                            <option value="2019">2019</option>
                            <option value="2018">2018</option>
                            <option value="2017">2017</option>
                            <option value="2016">2016</option>
                            <option value="2015">2015</option>
                            <option value="2014">2014</option>
                            <option value="2013">2013</option>
                            <option value="2012">2012</option>
                            <option value="2011">2011</option>
                            <option value="2010">2010</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="branch" class="form-label">Branch</label>
                        <select id="branch" class="form-control" required>
                            <option value="">Select Branch</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Information Technology">Information Technology</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Electrical">Electrical</option>
                            <option value="Mechanical">Mechanical</option>
                            <option value="Civil">Civil</option>
                            <option value="Chemical">Chemical</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="currentCompany" class="form-label">Current Company</label>
                    <input type="text" id="currentCompany" class="form-control" placeholder="Enter your current company">
                </div>
                <div class="d-flex gap-2">
                    <div class="form-group" style="flex: 1;">
                        <label for="jobRole" class="form-label">Job Role</label>
                        <input type="text" id="jobRole" class="form-control" placeholder="Your job role">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="location" class="form-label">Location</label>
                        <input type="text" id="location" class="form-control" placeholder="Your location">
                    </div>
                </div>
                <div class="form-group">
                    <label for="linkedin" class="form-label">LinkedIn Profile</label>
                    <input type="url" id="linkedin" class="form-control" placeholder="https://linkedin.com/in/yourprofile">
                </div>
                <div class="d-flex gap-2">
                    <div class="form-group" style="flex: 1;">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Create a password" required>
                        <span class="error-message" style="display: none; color: #EF4444; font-size: 0.875rem;"></span>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm password" required>
                        <span class="error-message" style="display: none; color: #EF4444; font-size: 0.875rem;"></span>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login</a></p>
                <p class="mt-3"><a href="index.html">← Back to Home</a></p>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
